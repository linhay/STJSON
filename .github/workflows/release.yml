name: Release

on:
  push:
    branches: [ master ]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release (on push to master)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          latest_tag="$(git tag --list --sort=-v:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)"
          if [[ -z "${latest_tag}" ]]; then
            next_tag="1.0.0"
          else
            IFS='.' read -r major minor patch <<< "${latest_tag}"
            patch=$((patch + 1))
            next_tag="${major}.${minor}.${patch}"
          fi
          echo "next_tag=${next_tag}" >> "${GITHUB_OUTPUT}"

      - name: Package skill artifact
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import tarfile
          import sys

          skill_root = Path("skills").resolve()
          out_dir = Path("skills/dist").resolve()
          allowed_entries = {"README.md", "stjson-usage", "stjson-dev-feedback", "stjson-update"}
          actual_entries = {
              path.name for path in skill_root.iterdir()
              if path.name not in {".DS_Store", "dist"}
          }
          unexpected = sorted(actual_entries - allowed_entries)
          missing = sorted(allowed_entries - actual_entries)
          if unexpected or missing:
              if unexpected:
                  print(f"[ERROR] Unexpected public skill entries: {unexpected}")
              if missing:
                  print(f"[ERROR] Missing public skill entries: {missing}")
              sys.exit(1)

          for skill_name in ("stjson-usage", "stjson-dev-feedback", "stjson-update"):
              skill_md = skill_root / skill_name / "SKILL.md"
              if not skill_md.exists():
                  print(f"[ERROR] SKILL.md not found at {skill_md}")
                  sys.exit(1)
              lines = skill_md.read_text(encoding="utf-8").lstrip("\ufeff").splitlines()
              if not lines or lines[0].strip() != "---":
                  print(f"[ERROR] Missing YAML frontmatter in {skill_md}")
                  sys.exit(1)
              try:
                  end_index = lines.index("---", 1)
              except ValueError:
                  print(f"[ERROR] Missing YAML frontmatter closing marker in {skill_md}")
                  sys.exit(1)
              frontmatter = lines[1:end_index]
              fields = {}
              for line in frontmatter:
                  if ":" in line:
                      key, value = line.split(":", 1)
                      fields[key.strip()] = value.strip().strip('"').strip("'")
              if not fields.get("name") or not fields.get("description"):
                  print(f"[ERROR] {skill_md} frontmatter must include name and description")
                  sys.exit(1)

          out_dir.mkdir(parents=True, exist_ok=True)
          bundle_filename = out_dir / "stjson-skills.tar.gz"
          skip_names = {".DS_Store"}

          with tarfile.open(bundle_filename, "w:gz") as tarf:
              for file_path in skill_root.rglob("*"):
                  if file_path.is_file():
                      if file_path.name in skip_names:
                          continue
                      if "dist" in file_path.parts:
                          continue
                      if any(part in ("__MACOSX",) for part in file_path.parts):
                          continue
                      arcname = Path("STJSON.skills") / file_path.relative_to(skill_root)
                      tarf.add(file_path, arcname=str(arcname))
                      print(f"  Added: {arcname}")

          print(f"\n[OK] Successfully packaged skills bundle to: {bundle_filename}")
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.next_tag }}
          name: Release ${{ steps.version.outputs.next_tag }}
          generate_release_notes: true
          files: |
            skills/dist/stjson-skills.tar.gz
